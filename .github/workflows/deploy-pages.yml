name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "bridge/powershell/bridge.ps1" # served as a download by the entry page
      - "scripts/copy-bridge.mjs"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install
        working-directory: ui
        run: npm ci
      - name: Build
        working-directory: ui
        env:
          # Project Pages site is served from /<repo>/
          BASE_PATH: /ForzaTuningAdvisor/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
