<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" font-family="Chakra Petch, Segoe UI, system-ui, sans-serif">
  <!-- panel -->
  <rect x="0.5" y="0.5" width="1199" height="199" rx="18" fill="#161619" stroke="#2a2a30"/>

  <!-- node: the game -->
  <rect x="70" y="48" width="290" height="78" rx="12" fill="#1e1e23" stroke="#2a2a30"/>
  <text x="215" y="82" text-anchor="middle" font-size="17" font-weight="700" fill="#e7e5e2">Forza Horizon 6</text>
  <text x="215" y="106" text-anchor="middle" font-size="13" font-family="Cascadia Mono, Consolas, ui-monospace, monospace" fill="#a3a09a">Data Out &#183; UDP :5300</text>

  <!-- link: UDP packets -->
  <line x1="360" y1="87" x2="455" y2="87" stroke="#2a2a30" stroke-width="2"/>
  <circle r="4.5" cy="87" fill="#fb923c">
    <animate attributeName="cx" values="362;450" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" cy="87" fill="#fb923c" opacity="0.7">
    <animate attributeName="cx" values="362;450" dur="1.4s" begin="0.47s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" cy="87" fill="#fb923c" opacity="0.4">
    <animate attributeName="cx" values="362;450" dur="1.4s" begin="0.93s" repeatCount="indefinite"/>
  </circle>

  <!-- node: the bridge -->
  <rect x="455" y="48" width="290" height="78" rx="12" fill="#1e1e23" stroke="#7c4a22"/>
  <text x="600" y="82" text-anchor="middle" font-size="17" font-weight="700" fill="#fb923c">bridge.ps1</text>
  <text x="600" y="106" text-anchor="middle" font-size="13" font-family="Cascadia Mono, Consolas, ui-monospace, monospace" fill="#a3a09a">324 bytes in &#183; JSON out</text>

  <!-- link: WebSocket frames -->
  <line x1="745" y1="87" x2="840" y2="87" stroke="#2a2a30" stroke-width="2"/>
  <circle r="4.5" cy="87" fill="#38bdf8">
    <animate attributeName="cx" values="747;835" dur="1.4s" begin="0.23s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" cy="87" fill="#38bdf8" opacity="0.7">
    <animate attributeName="cx" values="747;835" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" cy="87" fill="#38bdf8" opacity="0.4">
    <animate attributeName="cx" values="747;835" dur="1.4s" begin="1.17s" repeatCount="indefinite"/>
  </circle>

  <!-- node: the browser -->
  <rect x="840" y="48" width="290" height="78" rx="12" fill="#1e1e23" stroke="#2a2a30"/>
  <text x="985" y="82" text-anchor="middle" font-size="17" font-weight="700" fill="#e7e5e2">Your browser</text>
  <text x="985" y="106" text-anchor="middle" font-size="13" font-family="Cascadia Mono, Consolas, ui-monospace, monospace" fill="#a3a09a">ws://127.0.0.1:5301</text>

  <!-- privacy caption -->
  <circle cx="376" cy="161" r="3.5" fill="#34d058"/>
  <text x="600" y="166" text-anchor="middle" font-size="12.5" font-family="Cascadia Mono, Consolas, ui-monospace, monospace" fill="#a3a09a">both ports bind 127.0.0.1 &#183; telemetry never leaves your PC</text>
</svg>
