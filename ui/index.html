    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "Forza Tuning Advisor",
            "alternateName": "FTA",
            "url": "https://tautellini.github.io/ForzaTuningAdvisor/",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Windows 10, Windows 11",
            "description": "Live tuning advisor for Forza Horizon 6: reads the game's Data Out telemetry locally and turns it into concrete setup advice for balance, gearing, brakes, differential and aero.",
            "isAccessibleForFree": true,
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "softwareHelp": "https://github.com/Tautellini/ForzaTuningAdvisor"
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Is my telemetry uploaded anywhere?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. The bridge binds to 127.0.0.1 only and all analysis runs in your browser. Telemetry never leaves your PC."
                }
              },
              {
                "@type": "Question",
                "name": "Why does it need a PowerShell script?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Browsers cannot receive UDP. Forza broadcasts telemetry as UDP packets, so a small readable PowerShell script (the bridge) parses them and hands them to the page over a local WebSocket. No install, no admin rights."
                }
              },
              {
                "@type": "Question",
                "name": "Does it modify the game?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. It only listens to the telemetry stream Forza itself offers (the Data Out setting). No game files are touched and nothing is injected."
                }
              },
              {
                "@type": "Question",
                "name": "What advice does it give?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Setup fixes grounded in measurements: under/oversteer balance split by corner phase, optimal shift points from your measured power curve, brake pressure and balance, differential, aero, springs and damping hints — per discipline (Road, Dirt, Offroad, Drift, Drag)."
                }
              },
              {
                "@type": "Question",
                "name": "Which platforms are supported?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "The game and the bridge must run on the same Windows PC. The bridge listens on localhost only, so a console cannot reach it."
                }
              }
            ]
          }
        ]
      }
    </script>

      </p>
